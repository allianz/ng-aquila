<div
  #focusContainer
  class="nx-sort-header__focus-container"
  role="button"
  tabindex="0"
  [title]="_getTitle()"
  aria-live="polite"
>
  <ng-content></ng-content>

  <div
    [attr.aria-label]="_getAriaLabel()"
    class="nx-sort-header__icon-container nx-sort-header__icons-container"
  >
    @if (!_isSorted()) {
      <nx-icon name="popout" class="nx-sort-header__unsorted" aria-hidden="true" />
    } @else if (_isSortedAscending()) {
      <nx-icon name="arrow-up" class="nx-sort-header__ascend" aria-hidden="true" />
    } @else if (_isSortedDescending()) {
      <nx-icon name="arrow-down" class="nx-sort-header__descend" aria-hidden="true" />
    }
  </div>
</div>
