<div
  #container
  class="nx-dropdown-results__option"
  [ngClass]="{'nx-dropdown-results__option--selected': selected}"
>
  @if (multiselect) {
  <nx-checkbox [checked]="selected" [disabled]="disabled">
    <ng-container *ngTemplateOutlet="contentTemplate"></ng-container>
  </nx-checkbox>
  } @else {
  <span class="nx-dropdown-results__option-checkicon" aria-hidden="true">
    <nx-icon name="check" aria-hidden="true"></nx-icon>
  </span>
  <ng-container *ngTemplateOutlet="contentTemplate"></ng-container>
  }
</div>

<ng-template #contentTemplate>
  <div class="nx-dropdown-results__option-label">
    <div class="custom-content" #content (cdkObserveContent)="_onLabelChange()">
      <ng-content></ng-content>
    </div>

    <div class="value-content">@if (_isContentEmpty(content)) { {{_formattedValue }} }</div>

    @if (showRadioIndicator() && !multiselect) {
    <span class="nx-dropdown-results__option-radioicon" aria-hidden="true">
      <nx-radio-indicator [checked]="selected" [disabled]="disabled"></nx-radio-indicator>
    </span>
    }
  </div>
</ng-template>
