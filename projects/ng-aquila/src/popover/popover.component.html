<ng-template>
  <div
    [ngClass]="classList"
    class="nx-popover"
    role="dialog"
    aria-hidden="false"
    (click)="_onClick($event)"
    cdkMonitorSubtreeFocus
    (cdkFocusChange)="_onFocusChange($event)"
  >
    <div class="nx-popover__content" [attr.tabindex]="tabIndex" cdkFocusInitial>
      <div [id]="id">
        <ng-content></ng-content>
        <ng-container [ngTemplateOutlet]="_lazyContent?._template ?? null"></ng-container>
      </div>
      @if (showCloseButton) {
        <button
          nxPlainButton
          tabindex="0"
          [attr.aria-label]="_intl.closeIconLabel"
          class="nx-popover__close-icon"
          (click)="emitCloseButtonClick()"
          (keyup)="_onCloseKeyup($event)"
          (keydown)="_onCloseKeydown($event)"
        >
          <nx-icon aria-hidden="true" name="close"></nx-icon>
        </button>
      }
    </div>
    @if (!hidePopoverArrow) {
      <svg
        class="nx-popover__arrow"
        [ngStyle]="arrowStyle"
        viewBox="0 0 1 1"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <path [attr.d]="svgTrianglePath()" />
        <path class="nx-popover__arrow-border" [attr.d]="svgTriangleBorderPath()" />
      </svg>
    }
  </div>
</ng-template>
