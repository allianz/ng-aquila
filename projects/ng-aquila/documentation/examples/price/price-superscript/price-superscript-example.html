<div class="nx-margin-bottom-m">
  <span class="nx-margin-right-xl"> Default </span>
  <nx-price
    [value]="value"
    currency="USD"
    locale="en-US"
    [size]="size"
    prefix="from"
    suffix="per month"
  />
</div>

<div class="nx-margin-bottom-m">
  <span class="nx-margin-right-xl"> Superscript </span>
  <nx-price
    [value]="value"
    currency="USD"
    locale="en-US"
    [size]="size"
    superscript="true"
    prefix="from"
    suffix="per month"
  />
</div>

<div class="nx-margin-bottom-m">
  <span class="nx-margin-right-xl"> Superscript </span>
  <nx-price
    [value]="value"
    currency="EUR"
    locale="de-DE"
    [size]="size"
    superscript="true"
    prefix="from"
    suffix="per month"
  />
</div>
