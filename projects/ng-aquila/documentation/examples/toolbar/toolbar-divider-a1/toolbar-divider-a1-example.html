<nx-toolbar class="nx-margin-bottom-s">
  <button nxPlainButton type="button" aria-label="a useful label" class="back">
    <nx-icon name="chevron-left" aria-hidden="true"></nx-icon>
  </button>

  <nx-toolbar-divider></nx-toolbar-divider>

  <div class="nx-toolbar-description">
    <span>Max Mustermann</span>
  </div>

  <div class="nx-toolbar-actions">
    <button nxPlainButton aria-label="a useful label" type="button">
      <nx-icon name="help-o" aria-hidden="true"></nx-icon>
    </button>
    <button nxPlainButton aria-label="a useful label" type="button">
      <nx-icon name="bell-o" aria-hidden="true"></nx-icon>
    </button>
    <button nxPlainButton aria-label="a useful label" type="button">
      <nx-icon name="setting-o" aria-hidden="true"></nx-icon>
    </button>

    <button nxButton="secondary" size="small" type="button">
      <nx-icon name="save-o" aria-hidden="true" nxIconPositionStart></nx-icon
      >Save
    </button>

    <button nxButton="primary" size="small" type="button">
      <nx-icon name="plus" aria-hidden="true" nxIconPositionStart></nx-icon>New
      Content
    </button>
  </div>
</nx-toolbar>
