<div class="docs-inverse-container">
  <h4 nxHeadline="subsection-xsmall">Primary</h4>
  <button nxPlainButton inverse type="button" class="nx-margin-right-m">
    Default
  </button>
  <button
    nxPlainButton
    inverse
    size="small"
    type="button"
    aria-label="add item"
    class="nx-margin-right-m"
  >
    <nx-icon name="download" nxIconPositionStart aria-hidden="true"></nx-icon
    >Download
  </button>

  <button
    nxPlainButton
    inverse
    type="button"
    aria-label="add item"
    class="nx-margin-right-m"
  >
    <nx-icon name="calendar" aria-hidden="true"></nx-icon>
  </button>

  <button
    nxPlainButton
    inverse
    critical
    type="button"
    class="nx-margin-right-m"
  >
    Danger
  </button>

  <button
    nxPlainButton
    inverse
    disabled
    type="button"
    class="nx-margin-right-m"
  >
    Disabled
  </button>

  <h4 nxHeadline="subsection-xsmall" class="nx-margin-top-m">Secondary</h4>

  <button
    nxPlainButton
    inverse
    variant="secondary"
    type="button"
    class="nx-margin-right-m"
  >
    Default
  </button>
  <button
    nxPlainButton
    inverse
    size="small"
    variant="secondary"
    type="button"
    aria-label="add item"
    class="nx-margin-right-m"
  >
    <nx-icon name="download" nxIconPositionStart aria-hidden="true"></nx-icon>
    Download
  </button>

  <button
    nxPlainButton
    variant="secondary"
    inverse
    type="button"
    aria-label="add item"
    class="nx-margin-right-m"
  >
    <nx-icon name="calendar" aria-hidden="true"></nx-icon>
  </button>

  <button
    nxPlainButton
    inverse
    critical
    variant="secondary"
    type="button"
    class="nx-margin-right-m"
  >
    Danger
  </button>

  <button
    nxPlainButton
    inverse
    variant="secondary"
    disabled
    type="button"
    class="nx-margin-right-m"
  >
    Disabled
  </button>
</div>
