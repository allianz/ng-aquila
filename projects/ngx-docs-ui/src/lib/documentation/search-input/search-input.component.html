<div class="search-input">
  <nx-formfield>
    <input placeholder="Search" nxInput (keyup)="onSearchKeyUp($event)" [(ngModel)]="searchTerm" />
    @if (searchTerm) {
      <button
        nxPlainButton
        type="button"
        class="search-input__clear"
        (click)="resetSearchInput()"
        aria-label="Clear search"
      >
        <nx-icon name="close" aria-hidden="true"></nx-icon>
      </button>
    }
  </nx-formfield>
</div>
