<nx-small-stage>
  <nav aria-label="Breadcrumb" nxSmallStageHeader>
    <ol nxBreadcrumb>
      @for (item of dynamicItems; track item; let i = $index) {
      <li>
        <a nxBreadcrumbItem (click)="goToItem(i)" href="javascript:void(0)">
          {{ item }}
        </a>
      </li>
      }
    </ol>
  </nav>

  <nx-eyebrow>Eyebrow</nx-eyebrow>
  <h2 nxHeadline="page">Headline text</h2>

  <nx-small-stage-image
    nxSmallStageImageEnd
    src="assets/images/small-stage-image-end.svg"
    fill
  ></nx-small-stage-image>
  <nx-small-stage-image
    nxSmallStageImageBottom
    src="assets/images/small-stage-image-narrow-screen.svg"
    fill
  ></nx-small-stage-image>
</nx-small-stage>
